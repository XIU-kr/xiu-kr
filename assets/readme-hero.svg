<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title">
  <title id="title">XIU — a curious developer from Seoul</title>

  <defs>
    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0"    stop-color="#1a1a1a" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#1a1a1a" stop-opacity="0.8"/>
      <stop offset="0.85" stop-color="#1a1a1a" stop-opacity="0.8"/>
      <stop offset="1"    stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- paper -->
  <rect width="1200" height="360" fill="#f3eee2"/>

  <!-- top label row -->
  <line x1="120" y1="78" x2="480" y2="78" stroke="#1a1a1a" stroke-width="0.6" opacity="0.55"/>
  <text x="600" y="82" text-anchor="middle"
        font-family="'Iowan Old Style','Palatino Linotype',Georgia,serif"
        font-size="12" fill="#1a1a1a" letter-spacing="7">
    № &#8201;001 &#160;&#160; · &#160;&#160; SEOUL &#160;&#160; · &#160;&#160; MMXXVI
  </text>
  <line x1="720" y1="78" x2="1080" y2="78" stroke="#1a1a1a" stroke-width="0.6" opacity="0.55"/>

  <!-- wordmark -->
  <text x="600" y="220" text-anchor="middle"
        font-family="'Iowan Old Style','Palatino Linotype',Georgia,'Times New Roman',serif"
        font-weight="400" font-size="200" fill="#1a1a1a" letter-spacing="22">XIU</text>

  <!-- gold diamond accent -->
  <path d="M600 248 L606 254 L600 260 L594 254 Z" fill="#a8751a"/>

  <!-- rule -->
  <line x1="120" y1="290" x2="1080" y2="290" stroke="url(#rule)" stroke-width="0.8"/>

  <!-- italic tagline -->
  <text x="600" y="322" text-anchor="middle"
        font-family="'Iowan Old Style','Palatino Linotype',Georgia,serif"
        font-size="20" font-style="italic" fill="#1a1a1a" opacity="0.75">
    a curious developer &#160;·&#160; 호기심 많은 개발자
  </text>
</svg>
