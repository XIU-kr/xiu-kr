<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-labelledby="title">
  <title id="title">XIU — a curious developer from Seoul</title>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8a6810" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#b8860b"/>
      <stop offset="0.5" stop-color="#f5d36b"/>
      <stop offset="0.88" stop-color="#b8860b"/>
      <stop offset="1" stop-color="#8a6810" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#d4a016" opacity="0.16"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="440" fill="#07070b"/>
  <rect width="1200" height="440" fill="url(#dots)"/>

  <!-- vertical edge rules -->
  <g stroke="#d4a016" stroke-width="1" opacity="0.55" fill="none">
    <line x1="60" y1="60" x2="60" y2="380"/>
    <line x1="1140" y1="60" x2="1140" y2="380"/>
  </g>

  <!-- corner plus marks -->
  <g stroke="#d4a016" stroke-width="1.1" fill="none" opacity="0.9">
    <path d="M50 60 L70 60 M60 50 L60 70"/>
    <path d="M1130 60 L1150 60 M1140 50 L1140 70"/>
    <path d="M50 380 L70 380 M60 370 L60 390"/>
    <path d="M1130 380 L1150 380 M1140 370 L1140 390"/>
  </g>

  <!-- top eyebrow -->
  <text x="600" y="105" text-anchor="middle"
        font-family="'Courier New', Menlo, monospace" font-size="12"
        fill="#d4a016" letter-spacing="6">— EST · 2026 · SEOUL · DEVELOPER —</text>

  <!-- thin gold rule above wordmark -->
  <line x1="240" y1="135" x2="960" y2="135" stroke="#d4a016" stroke-width="0.6" opacity="0.6"/>

  <!-- main wordmark -->
  <text x="600" y="262" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="208"
        fill="#f5f5f7" letter-spacing="14">XIU</text>

  <!-- gold rule + diamond beneath wordmark -->
  <line x1="170" y1="296" x2="1030" y2="296" stroke="url(#gold)" stroke-width="1.5"/>
  <path d="M600 288 L608 296 L600 304 L592 296 Z" fill="#d4a016"/>

  <!-- subtitle -->
  <text x="600" y="338" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic"
        fill="#b8b8c0">호기심 많은 개발자 · a curious developer</text>

  <!-- bottom domain tags -->
  <text x="600" y="380" text-anchor="middle"
        font-family="'Courier New', Menlo, monospace" font-size="11"
        fill="#5a5a64" letter-spacing="3">AI · GAME SERVERS · CHURCH TECH · INFRASTRUCTURE</text>
</svg>
