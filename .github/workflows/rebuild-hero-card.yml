name: Rebuild Hero Card

# Regenerates assets/readme-hero.svg by re-fetching the GitHub
# avatar and re-embedding it. Triggers:
#   • every push to main (catches content edits in build-hero.py)
#   • daily at 03:00 UTC (catches profile avatar changes)
#   • manual dispatch

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-hero-card
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "Pillow==10.4.0"

      - name: Rebuild hero SVG
        run: python scripts/build-hero.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/readme-hero.svg README.md; then
            echo "Hero card already up to date — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/readme-hero.svg README.md
          git commit -m "chore: rebuild hero card"
          git push
